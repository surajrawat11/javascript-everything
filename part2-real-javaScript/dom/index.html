<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOM Selection Demo</title>
</head>
<body>
  <!-- Example element with unique ID -->
  <h1 id="title">Hello DOM!</h1>

  <!-- Two elements with the same class -->
  <p class="text">Paragraph 1</p>
  <p class="text">Paragraph 2</p>

  <!-- Two div elements (same tag name) -->
  <div>First div</div>
  <div>Second div</div>

  <!-- Button with ID to trigger JS -->
  <button id="btn">Click Me</button>

  <!-- Linking external JS file -->
  <script src="script.js"></script>
</body>
</html>
